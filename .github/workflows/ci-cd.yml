name: CI/CD Pipeline
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
 
jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run backend tests
        working-directory: backend
        # Replace with tests 
        run: echo 'no tests yet'

  deploy:
    name: Deploy to Vercel
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Vercel
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          META="-m githubDeployment=1 \
                -m githubCommitRef=${{ github.ref_name }} \
                -m githubCommitSha=${{ github.sha }} \
                -m githubOrg=${{ github.repository_owner }} \
                -m githubRepo=${{ github.event.repository.name }}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            npx vercel --token "$VERCEL_TOKEN" --prod --yes $META
          else
            npx vercel --token "$VERCEL_TOKEN" --yes $META
          fi

